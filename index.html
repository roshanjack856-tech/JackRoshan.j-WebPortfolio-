<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Modern Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  min-height:100vh;

  overflow:hidden;

  font-family:'Outfit',sans-serif;

  color:white;

  background-image:url("windows-black.png");

  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

/* NAVBAR */

nav{

  width:100%;

  padding:22px 8%;

  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{

  font-size:2rem;

  font-weight:700;

  color:#00c3ff;
}

.nav-links{

  display:flex;

  gap:35px;

  list-style:none;
}

.nav-links a{

  text-decoration:none;

  color:white;

  transition:.3s;
}

.nav-links a:hover{

  color:#00c3ff;
}

/* HERO */

.hero{

  min-height:90vh;

  display:flex;

  align-items:center;
  justify-content:space-between;

  padding:0 8%;
}

/* LEFT */

.hero-left{

  flex:1;
}

.small-title{

  color:#00c3ff;

  letter-spacing:4px;

  margin-bottom:20px;

  font-size:13px;
}

.hero-title{

  font-size:5rem;

  line-height:1.1;

  margin-bottom:25px;
}

.hero-title span{

  color:#00c3ff;
}

.hero-text{

  max-width:550px;

  line-height:1.9;

  color:#d8d8d8;

  margin-bottom:35px;
}

/* BUTTON */

.btn{

  display:inline-block;

  padding:15px 30px;

  border-radius:10px;

  background:#00c3ff;

  color:black;

  text-decoration:none;

  font-weight:600;

  transition:.3s;
}

.btn:hover{

  transform:translateY(-5px);
}

/* RIGHT IMAGE */

.hero-right{

  flex:1;

  display:flex;
  justify-content:center;
}

.image-box{

  width:420px;
  height:420px;

  border-radius:50%;

  overflow:hidden;

  border:3px solid #00c3ff;
}

.image-box img{

  width:100%;
  height:100%;

  object-fit:cover;
}

/* MOBILE */

@media(max-width:1000px){

  body{
    overflow:auto;
  }

  .hero{

    flex-direction:column;

    text-align:center;

    padding:60px 8%;
  }

  .hero-title{
    font-size:3rem;
  }

  .image-box{

    width:280px;
    height:280px;

    margin-top:40px;
  }

  .nav-links{
    display:none;
  }

}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav>

  <div class="logo">
    Jack Roshan
  </div>

  <ul class="nav-links">

    <li><a href="#">Home</a></li>

    <li><a href="#">About</a></li>

    <li><a href="#">Services</a></li>

    <li><a href="#">Projects</a></li>

    <li><a href="#">Contact</a></li>

  </ul>

</nav>

<!-- HERO -->

<section class="hero">

  <!-- LEFT -->

  <div class="hero-left">

    <div class="small-title">
      FULL STACK DEVELOPER
    </div>

    <h1 class="hero-title">

      Modern <span>Portfolio</span>

    </h1>

    <p class="hero-text">

      I create modern responsive websites with premium UI design,
      smooth user experience, GitHub integration, and Vercel deployment.

    </p>

    <a href="#" class="btn">
      View Projects
    </a>

  </div>

  <!-- RIGHT -->

  <div class="hero-right">

    <div class="image-box">

      <img src="resume-photo.jpg" alt="Jack Roshan">

    </div>

  </div>

</section>

</body>

</html>
